name: Publish daily A-share snapshot

"on":
  workflow_dispatch: {}
  schedule:
    - cron: "30 10 * * 1-5"

permissions:
  contents: read

concurrency:
  group: publish-a-share-snapshot
  cancel-in-progress: false

jobs:
  publish:
    runs-on: ubuntu-latest
    timeout-minutes: 360
    env:
      HF_TOKEN: ${{ secrets.HF_TOKEN }}
      HF_SNAPSHOT_REPO_ID: ${{ vars.HF_SNAPSHOT_REPO_ID }}
      TUSHARE_TOKEN: ${{ secrets.TUSHARE_TOKEN }}
      DATA_FETCH_WORKERS: "12"
      DATA_SOCKET_TIMEOUT: "30"
      TQDM_DISABLE: "1"
      REUSE_SYMBOL_CACHE: "1"
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"
          cache: pip
      - run: python -m pip install -r requirements.txt
      - name: Restore per-stock history cache
        id: restore-symbol-cache
        uses: actions/cache/restore@v4
        with:
          path: data/cache/symbols
          key: a-share-symbols-${{ runner.os }}-${{ github.run_id }}
          restore-keys: |
            a-share-symbols-${{ runner.os }}-
      - name: Build and publish verified snapshot
        id: build-snapshot
        continue-on-error: true
        run: python scripts/build_snapshot.py --output data/snapshot --history-years 4 --force-refresh --publish
      - name: Save per-stock history cache
        if: always() && steps.restore-symbol-cache.outputs.cache-hit != 'true'
        uses: actions/cache/save@v4
        with:
          path: data/cache/symbols
          key: a-share-symbols-${{ runner.os }}-${{ github.run_id }}
      - name: Enforce snapshot build result
        if: steps.build-snapshot.outcome == 'failure'
        run: exit 1
